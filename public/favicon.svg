<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <!-- favicon.svg（背景の「目玉」を 1 個取り出したもの）を白／透明／白で塗り直した版。
         3 層の同じ幾何（外円・中円・瞳）を使い、内側から 瞳=白／中間=透明／外=白 にする。
         中間を「透明」にするため、外側の白円から中円ぶんをマスクで抜き、その上に白い瞳を
         重ねる。これで「白いふち → 透ける隙間 → 白い瞳」になり、地（タブやページ）が
         隙間から透けて見える。色は単色（白）なので濃い地の上で使う前提。 -->
    <defs>
        <mask id="gap">
            <rect width="128" height="128" fill="#fff" />
            <!-- 中円ぶんを黒で抜いて透明な隙間にする -->
            <circle cx="76.98" cy="73.09" r="40.2" fill="#000" />
        </mask>
    </defs>
    <!-- 外: 白（中円ぶんが抜けた白いふち） -->
    <circle cx="64" cy="64" r="60" fill="#fff" mask="url(#gap)" />
    <!-- 内: 白い瞳（透明な隙間の中に重ねる） -->
    <circle cx="85.66" cy="79.17" r="26.93" fill="#fff" />
</svg>
